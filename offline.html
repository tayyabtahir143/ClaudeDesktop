<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Claude Desktop</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #1a1a1a;
            color: #ccc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .box {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #eee;
            margin: 0 0 0.5rem;
        }
        p {
            font-size: 0.875rem;
            color: #777;
            margin: 0 0 1.5rem;
        }
        .dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 3px;
            border-radius: 50%;
            background: #555;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: .2s; }
        .dots span:nth-child(3) { animation-delay: .4s; }
        @keyframes pulse {
            0%, 80%, 100% { opacity: .2; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>No internet connection</h1>
        <p>Will reconnect automatically when the network is back.</p>
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</body>
</html>

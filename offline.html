<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Connection — Claude Desktop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #d0d0d0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .card {
            text-align: center;
            max-width: 360px;
            padding: 3rem 2rem;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.25rem;
            opacity: 0.6;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #555;
            animation: blink 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; }
            40%            { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚡</div>
        <h1>No internet connection</h1>
        <p>Claude Desktop will reconnect and reload automatically once the network is available.</p>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</body>
</html>
